<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Ethan Tilak</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" href="rif/icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1a;
      --surface: #111827;
      --border: rgba(255,255,255,0.07);
      --accent: #4fffb0;
      --accent2: #4fc3ff;
      --text: #e8edf5;
      --muted: #7a8ba0;
      --tag-bg: rgba(79,255,176,0.08);
      --tag-border: rgba(79,255,176,0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      background-image: url('rif/codingBackgroundImage (1).webp');
      background-repeat: repeat-y;
      background-size: 100%;
      background-attachment: fixed;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(10, 15, 26, 0.82);
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(10,15,26,0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 2.5rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      height: 56px;
      gap: 2rem;
    }

    nav a {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    nav a:hover, nav a.active { color: var(--accent); }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2.5rem;
    }

    .page-header {
      padding: 5rem 0 3.5rem;
    }

    .page-header-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.8rem;
      opacity: 0.8;
    }

    .page-header h1 {
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 700;
      line-height: 1.0;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .page-header h1 span { color: var(--accent); }

    .page-header-sub {
      margin-top: 1rem;
      font-size: 1rem;
      color: var(--muted);
      font-weight: 300;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0.5rem 0 4rem;
    }

    .project {
      margin-bottom: 5rem;
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }

    .project.visible { opacity: 1; transform: translateY(0); }

    .project-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.4rem;
      flex-wrap: wrap;
    }

    .project-number {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      padding: 3px 10px;
      border-radius: 2px;
    }

    .tag.blue {
      color: var(--accent2);
      background: rgba(79,195,255,0.08);
      border-color: rgba(79,195,255,0.25);
    }

    .project-title {
      font-size: clamp(1.6rem, 3.5vw, 2.5rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 1.2rem;
      line-height: 1.15;
    }

    .project-body {
      font-size: 1rem;
      line-height: 1.75;
      color: #a8b8cc;
      font-weight: 300;
      max-width: 780px;
      margin-bottom: 2rem;
    }

    .project-body strong { color: var(--text); font-weight: 500; }

    .stat-bar {
      display: inline-flex;
      align-items: center;
      gap: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.9rem 1.4rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .stat { display: flex; flex-direction: column; gap: 2px; }

    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-sep { width: 1px; height: 32px; background: var(--border); }

    .slideshow {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .slides-track {
      display: flex;
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .slide {
      min-width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      padding: 1rem;
    }

    .slide img {
      max-height: 520px;
      max-width: 100%;
      object-fit: contain;
      border-radius: 3px;
      display: block;
    }

    .slide-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1.2rem;
      border-top: 1px solid var(--border);
      background: rgba(10,15,26,0.5);
    }

    .slide-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      padding: 0.45rem 1rem;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      letter-spacing: 0.05em;
    }

    .slide-btn:hover { border-color: var(--accent); color: var(--accent); }

    .slide-counter {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .slide-dots { display: flex; gap: 6px; align-items: center; }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }

    .dot.active { background: var(--accent); transform: scale(1.3); }

    .result-img-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-img-wrap img { max-width: 100%; border-radius: 3px; display: block; }

    .contact-strip {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 3rem 0 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .contact-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .icon-row { display: flex; gap: 1.2rem; align-items: center; }

    .icon-row a {
      display: inline-flex;
      opacity: 0.65;
      transition: opacity 0.2s, transform 0.2s;
    }

    .icon-row a:hover { opacity: 1; transform: translateY(-4px); }

    /* FEATURED PROJECT */
    .project-featured {
      margin-bottom: 5rem;
      background: var(--surface);
      border: 1px solid rgba(79,255,176,0.2);
      border-radius: 8px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }

    .project-featured.visible { opacity: 1; transform: translateY(0); }

    .featured-banner {
      background: rgba(79,255,176,0.07);
      border-bottom: 1px solid rgba(79,255,176,0.15);
      padding: 0.55rem 1.6rem;
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .featured-banner-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.85); }
    }

    .featured-banner-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
